name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: JS syntax check
        run: npm run check

      - name: JS test suites
        run: npm test

      - name: Backend Python deps
        run: python -m pip install -r backend/requirements.txt

      - name: Backend tests (offgrid parity dahil)
        run: python -m pytest backend/tests -q
