<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Solar Rota modern hesaplama mimarisi</title>
  <desc id="desc">Solar Rota icin PVGIS, pvlib, 8760 saatlik simulasyon, off-grid dispatch ve finansal model katmanlarini anlatan hero gorseli.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.44" stop-color="#0B2635"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="0.55" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <style>
      .small{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#B8CBDD}
      .tiny{font:600 14px Inter,Segoe UI,Arial,sans-serif;fill:#D9E7F2}
      .muted{font:500 13px Inter,Segoe UI,Arial,sans-serif;fill:#91A7BA}
      .title{font:800 62px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC;letter-spacing:0}
      .kpi{font:800 28px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}
      .label{font:700 16px Inter,Segoe UI,Arial,sans-serif;fill:#F8FAFC}
    </style>
  </defs>
  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="34" fill="url(#grid)"/>
  <circle cx="1015" cy="112" r="146" fill="url(#sun)" opacity="0.16"/>
  <circle cx="1028" cy="108" r="82" fill="url(#sun)" opacity="0.82"/>
  <path d="M825 120C910 58 1056 84 1128 168" fill="none" stroke="#FDE68A" stroke-width="2" stroke-opacity="0.34"/>
  <path d="M785 402C902 334 1058 346 1148 432" fill="none" stroke="#67E8F9" stroke-width="2" stroke-opacity="0.28"/>

  <g transform="translate(68 72)">
    <rect x="0" y="0" width="152" height="34" rx="17" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-opacity="0.42"/>
    <text x="18" y="23" class="tiny" fill="#FDE68A">Solar feasibility suite</text>
    <text x="0" y="94" class="title">Solar Rota</text>
    <text x="0" y="132" class="small">Turkiye icin PVGIS + pvlib destekli, senaryo bazli</text>
    <text x="0" y="160" class="small">gunes enerjisi, BESS, off-grid dispatch ve finansal fizibilite platformu.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="68" y="268" width="298" height="118" rx="20" fill="#0F1F2E" stroke="#224258"/>
    <text x="92" y="304" class="kpi">8.760</text>
    <text x="92" y="334" class="label">saatlik enerji modeli</text>
    <text x="92" y="360" class="muted">Uretim, tuketim, batarya SOC ve sebekeye akis saat bazinda izlenir.</text>

    <rect x="390" y="268" width="298" height="118" rx="20" fill="#0F1F2E" stroke="#224258"/>
    <text x="414" y="304" class="kpi">PVGIS + pvlib</text>
    <text x="414" y="334" class="label">cok katmanli uretim motoru</text>
    <text x="414" y="360" class="muted">Proxy, direct fetch, PSH fallback ve Python muhendislik servisi.</text>

    <rect x="712" y="268" width="298" height="118" rx="20" fill="#0F1F2E" stroke="#224258"/>
    <text x="736" y="304" class="kpi">L2 Dispatch</text>
    <text x="736" y="334" class="label">off-grid kritik yuk onceligi</text>
    <text x="736" y="360" class="muted">PV, batarya, inverter limiti ve jeneratör birlikte simule edilir.</text>
  </g>

  <g transform="translate(742 84)" filter="url(#shadow)">
    <rect x="0" y="0" width="352" height="142" rx="22" fill="#0C1B28" stroke="#23465D"/>
    <path d="M38 102L94 58L160 84L220 38L310 94" fill="none" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="94" cy="58" r="10" fill="#67E8F9"/>
    <circle cx="220" cy="38" r="10" fill="#F59E0B"/>
    <text x="28" y="34" class="label">Hesap motoru karar zinciri</text>
    <text x="28" y="126" class="muted">Gercek veri varsa o kazanir; fallback sadece etiketlenmis tahmindir.</text>
  </g>

  <g transform="translate(72 426)">
    <rect x="0" y="0" width="186" height="44" rx="22" fill="#132B3C" stroke="#2D566D"/>
    <text x="24" y="29" class="tiny">Cati geometrisi</text>
    <path d="M198 22H250" stroke="#3B647A" stroke-width="3" stroke-linecap="round"/>
    <rect x="262" y="0" width="170" height="44" rx="22" fill="#132B3C" stroke="#2D566D"/>
    <text x="286" y="29" class="tiny">Uretim motoru</text>
    <path d="M444 22H496" stroke="#3B647A" stroke-width="3" stroke-linecap="round"/>
    <rect x="508" y="0" width="176" height="44" rx="22" fill="#132B3C" stroke="#2D566D"/>
    <text x="532" y="29" class="tiny">Saatlik denge</text>
    <path d="M696 22H748" stroke="#3B647A" stroke-width="3" stroke-linecap="round"/>
    <rect x="760" y="0" width="184" height="44" rx="22" fill="#132B3C" stroke="#2D566D"/>
    <text x="784" y="29" class="tiny">Finansal tablo</text>
  </g>
</svg>
