<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Solar Rota hesaplama akisi</title>
  <desc id="desc">Kullanici girdilerinden rapora kadar Solar Rota hesaplama katmanlarinin akis diyagrami.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E8F2F7"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1{font:800 38px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}
      .sub{font:500 17px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .num{font:800 18px Inter,Segoe UI,Arial,sans-serif;fill:#FFFFFF}
      .head{font:800 20px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}
      .body{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .mini{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#0F172A}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="62" y="74" class="h1">Hesaplama Akisi: girdiden teklif ciktisina</text>
  <text x="62" y="108" class="sub">Solar Rota, tek bir buyuk formul degil; veri kalitesine gore secilen muhendislik katmanlari zinciridir.</text>

  <path d="M216 218H312" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M508 218H604" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M800 218H896" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1042 292V368H160V410" stroke="#94A3B8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M306 514H402" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M598 514H694" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M890 514H986" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#cardShadow)">
    <rect x="62" y="150" width="154" height="136" rx="18" fill="#FFFFFF"/>
    <circle cx="94" cy="182" r="20" fill="url(#amber)"/><text x="88" y="189" class="num">1</text>
    <text x="82" y="222" class="head">Girdi</text>
    <text x="82" y="250" class="body">Senaryo, il, koordinat,</text>
    <text x="82" y="272" class="body">cati, tarife, yuk</text>

    <rect x="354" y="150" width="154" height="136" rx="18" fill="#FFFFFF"/>
    <circle cx="386" cy="182" r="20" fill="url(#teal)"/><text x="380" y="189" class="num">2</text>
    <text x="374" y="222" class="head">Yerlesim</text>
    <text x="374" y="250" class="body">Panel sayisi, kWp,</text>
    <text x="374" y="272" class="body">coklu cati bolumu</text>

    <rect x="646" y="150" width="154" height="136" rx="18" fill="#FFFFFF"/>
    <circle cx="678" cy="182" r="20" fill="url(#blue)"/><text x="672" y="189" class="num">3</text>
    <text x="666" y="222" class="head">Uretim</text>
    <text x="666" y="250" class="body">PVGIS, pvlib veya</text>
    <text x="666" y="272" class="body">PSH fallback</text>

    <rect x="938" y="150" width="154" height="136" rx="18" fill="#FFFFFF"/>
    <circle cx="970" cy="182" r="20" fill="url(#amber)"/><text x="964" y="189" class="num">4</text>
    <text x="958" y="222" class="head">Kayiplar</text>
    <text x="958" y="250" class="body">Golge, kirlenme,</text>
    <text x="958" y="272" class="body">inverter, kablo</text>

    <rect x="62" y="446" width="244" height="142" rx="18" fill="#FFFFFF"/>
    <circle cx="96" cy="480" r="20" fill="url(#teal)"/><text x="90" y="487" class="num">5</text>
    <text x="84" y="520" class="head">8760 saatlik denge</text>
    <text x="84" y="548" class="body">Her saat icin uretim, tuketim,</text>
    <text x="84" y="570" class="body">oz tuketim, ithalat, ihracat.</text>

    <rect x="444" y="446" width="154" height="142" rx="18" fill="#FFFFFF"/>
    <circle cx="476" cy="480" r="20" fill="url(#blue)"/><text x="470" y="487" class="num">6</text>
    <text x="464" y="520" class="head">Dispatch</text>
    <text x="464" y="548" class="body">Batarya SOC, kritik</text>
    <text x="464" y="570" class="body">yuk, jeneratör</text>

    <rect x="736" y="446" width="154" height="142" rx="18" fill="#FFFFFF"/>
    <circle cx="768" cy="480" r="20" fill="url(#amber)"/><text x="762" y="487" class="num">7</text>
    <text x="756" y="520" class="head">Finans</text>
    <text x="756" y="548" class="body">25 yil nakit akisi,</text>
    <text x="756" y="570" class="body">NPV, IRR, LCOE</text>

    <rect x="1028" y="446" width="110" height="142" rx="18" fill="#FFFFFF"/>
    <circle cx="1060" cy="480" r="20" fill="url(#teal)"/><text x="1054" y="487" class="num">8</text>
    <text x="1048" y="520" class="head">Rapor</text>
    <text x="1048" y="548" class="body">Denetim,</text>
    <text x="1048" y="570" class="body">uyari, PDF</text>
  </g>

  <rect x="62" y="632" width="1076" height="48" rx="24" fill="#0F172A"/>
  <text x="92" y="662" class="mini" fill="#E2E8F0">Temel ilke: tek kosuda tek otoriter uretim kaynagi kullanilir; fallback veya tahmin kullanildiysa sonuc metadata ile acikca etiketlenir.</text>
</svg>
